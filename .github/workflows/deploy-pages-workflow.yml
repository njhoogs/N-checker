name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build output folder
        run: |
          mkdir -p _site
          cp spring-n-check.html _site/index.html
          # Inject real secrets only into the built output, never into the
          # committed source file in the repo. APPS_SCRIPT_URL is the same
          # GitHub secret monitor.py already reads — one place to update
          # for both the webpage and the daily check.
          sed -i "s|YOUR_GOOGLE_MAPS_API_KEY|${{ secrets.GOOGLE_MAPS_API_KEY }}|g" _site/index.html
          sed -i "s|APPS_SCRIPT_URL_PLACEHOLDER|${{ secrets.APPS_SCRIPT_URL }}|g" _site/index.html

          # 9am-rule test variant — same secret injection, published under
          # its own filename alongside the main page.
          if [ -f spring-n-check-9am-rule.html ]; then
            cp spring-n-check-9am-rule.html _site/spring-n-check-9am-rule.html
            sed -i "s|YOUR_GOOGLE_MAPS_API_KEY|${{ secrets.GOOGLE_MAPS_API_KEY }}|g" _site/spring-n-check-9am-rule.html
            sed -i "s|APPS_SCRIPT_URL_PLACEHOLDER|${{ secrets.APPS_SCRIPT_URL }}|g" _site/spring-n-check-9am-rule.html
          fi

          # 10am/7-day-window-rule test variant — same secret injection.
          if [ -f spring-n-check-10am-rule.html ]; then
            cp spring-n-check-10am-rule.html _site/spring-n-check-10am-rule.html
            sed -i "s|YOUR_GOOGLE_MAPS_API_KEY|${{ secrets.GOOGLE_MAPS_API_KEY }}|g" _site/spring-n-check-10am-rule.html
            sed -i "s|APPS_SCRIPT_URL_PLACEHOLDER|${{ secrets.APPS_SCRIPT_URL }}|g" _site/spring-n-check-10am-rule.html
          fi

          # 10-year threshold comparison (climatology only) — same secret
          # injection. This page has no Apps Script dependency, but the sed
          # is harmless if the placeholder isn't present.
          if [ -f spring-n-climatology.html ]; then
            cp spring-n-climatology.html _site/spring-n-climatology.html
            sed -i "s|YOUR_GOOGLE_MAPS_API_KEY|${{ secrets.GOOGLE_MAPS_API_KEY }}|g" _site/spring-n-climatology.html
          fi

      - name: Verify substitution (debug, no secret values shown)
        run: |
          SECRET_LEN="${#APPS_SCRIPT_URL_SECRET}"
          echo "APPS_SCRIPT_URL secret length (0 = not set or empty): $SECRET_LEN"
          REMAINING=$(grep -c "APPS_SCRIPT_URL_PLACEHOLDER" _site/index.html || true)
          echo "Placeholder occurrences remaining in built file (should be 0): $REMAINING"
        env:
          APPS_SCRIPT_URL_SECRET: ${{ secrets.APPS_SCRIPT_URL }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

