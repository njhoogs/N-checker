name: Daily Spring N Check

"on":
  schedule:
    # 21:30 UTC = 9:30am NZST (UTC+12) / 8:30am NZDT (UTC+13)
    # Adjust the hour below by 1 if NZ daylight saving is in effect
    - cron: "30 21 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab to test

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          APPS_SCRIPT_SECRET: ${{ secrets.APPS_SCRIPT_SECRET }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python monitor.py

